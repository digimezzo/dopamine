<div class="window-button" mat-icon-button [matMenuTriggerFor]="menu" matTooltip="{{ 'open-menu' | translate }}">
    <div class="main-menu__button">
        <div class="main-menu__icon las la-bars"></div>
        <div class="main-menu__updateindicator" *ngIf="this.updateService.isUpdateAvailable"></div>
    </div>
</div>
<mat-menu #menu="matMenu">
    <button mat-menu-item (click)="goToManageCollectionAsync()">
        <i class="las la-database mr-1 font-16px"></i> {{ 'manage-collection' | translate }}
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="goToSettingsAsync()"><i class="las la-cog mr-1 font-16px"></i> {{ 'settings' | translate }}</button>
    <button mat-menu-item (click)="goToInformationAsync()">
        <i class="las la-info-circle mr-1 font-16px"></i> {{ 'information' | translate }}
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="browseToDonateLinkAsync()">
        <i class="accent-color las la-heart mr-1 font-16px"></i> {{ 'donate' | translate }}
    </button>
    <div *ngIf="this.updateService.isUpdateAvailable">
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="downloadLatestReleaseAsync()">
            <div class="accent-color">
                <i class="accent-color las la-download mr-1"></i> {{ 'download-action' | translate }} {{ this.applicationName }}
                {{ this.updateService.latestRelease }}
            </div>
        </button>
    </div>
</mat-menu>
