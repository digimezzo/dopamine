<div class="h-100 w-100 d-flex flex-column">
    <div class="title" *ngIf="this.showTitle">{{ 'playback-queue' | translate }}</div>
    <div class="playback-queue__header d-flex flex-row align-items-center mt-2">
        <div class="d-flex flex-row m-1">
            <div class="playback-queue__trackscount mr-2">{{ this.filteredTracks.length }}</div>
            <div *ngIf="this.filteredTracks.length === 1">{{ 'track' | translate }}</div>
            <div *ngIf="this.filteredTracks.length !== 1">{{ 'tracks' | translate }}</div>
        </div>
        <div class="d-flex flex-row align-items-center">
            <app-icon-button
                class="mr-2"
                icon="las la-crosshairs"
                matTooltip="{{ 'jump-to-playing-song' | translate }}"
                (click)="scrollToPlayingTrack()"
            ></app-icon-button>
            <div class="app-search-box playback-queue__search" [ngClass]="{ 'app-search-box-highlight': this.hasSearchText }">
                <input class="app-search-box__input p-1" [(ngModel)]="this.searchText" />
                <div class="app-search-box__icons">
                    <i class="las la-search app-search-box-icon" *ngIf="!this.hasSearchText"></i>
                    <i class="las la-times app-search-box-icon pointer" *ngIf="this.hasSearchText" (click)="clearSearchText()"></i>
                </div>
            </div>
        </div>
    </div>
    <cdk-virtual-scroll-viewport
        *ngIf="this.shouldShowList"
        class="flex-grow mt-3"
        itemSize="46"
        (cdkDropListDropped)="this.dropTrack($event)"
        cdkDropList
        [cdkDropListData]="this.filteredTracks"
        [cdkDropListDisabled]="!this.canReorderQueue"
    >
        <div *cdkVirtualFor="let track of this.filteredTracks" (mousedown)="setSelectedTracks($event, track)" cdkDrag>
            <app-track
                [track]="track"
                (dblclick)="this.playbackService.playQueuedTrackAsync(track)"
                (contextmenu)="onTrackContextMenu($event, track)"
            ></app-track>
        </div>
    </cdk-virtual-scroll-viewport>
    <app-totals
        class="mt-3"
        [totalDurationInMilliseconds]="this.playbackService.playbackQueue.totalDurationInMilliseconds"
        [totalFileSizeInBytes]="this.playbackService.playbackQueue.totalFileSizeInBytes"
    ></app-totals>
</div>

<div
    #trackContextMenuAnchor
    style="visibility: hidden; position: fixed"
    [style.left]="contextMenuOpener.positionX"
    [style.top]="contextMenuOpener.positionY"
    [matMenuTriggerFor]="trackContextMenu"
></div>
<mat-menu #trackContextMenu="matMenu">
    <ng-template matMenuContent let-track="data">
        <button mat-menu-item (click)="onRemoveFromQueue()">{{ 'remove-from-playback-queue' | translate }}</button>
    </ng-template>
</mat-menu>
