<div class="h-100 w-100 d-flex flex-column">
    <div class="title" *ngIf="this.showTitle">{{ 'playback-queue' | translate }}</div>
    <div class="d-flex flex-row m-1">
        <div class="playback-queue__trackscount mr-2">
            {{ this.playbackService.playbackQueue.numberOfTracks + this.playbackService.nextQueue.length }}
        </div>
        <div *ngIf="this.playbackService.playbackQueue.numberOfTracks === 1">{{ 'track' | translate }}</div>
        <div *ngIf="this.playbackService.playbackQueue.numberOfTracks !== 1">{{ 'tracks' | translate }}</div>
    </div>
    <div class="playback-queue__lists-container flex-grow mt-3">
        <!-- Playing Next -->

        <div class="d-flex flex-column mb-4" *ngIf="this.playbackService.nextQueue.length > 0 && this.shouldShowList">
            <div class="larger mb-2">{{ 'playing-next' | translate }}</div>
            <div *ngFor="let track of this.playbackService.nextQueue">
                <app-track
                    [track]="track"
                    (dblclick)="this.playbackService.playQueuedTrackAsync(track)"
                    (contextmenu)="onTrackContextMenu($event, track)"
                ></app-track>
            </div>
        </div>

        <!-- Playback Queue -->
        <div class="larger mb-2">{{ 'next-in-queue' | translate }}</div>
        <div *ngIf="this.shouldShowList">
            <div *ngFor="let track of this.playbackService.playbackQueue.tracks" (mousedown)="setSelectedTracks($event, track)">
                <app-track
                    [track]="track"
                    (dblclick)="this.playbackService.playQueuedTrackAsync(track)"
                    (contextmenu)="onTrackContextMenu($event, track)"
                ></app-track>
            </div>
        </div>
    </div>
    <app-totals
        class="mt-3"
        [totalDurationInMilliseconds]="this.playbackService.playbackQueue.totalDurationInMilliseconds"
        [totalFileSizeInBytes]="this.playbackService.playbackQueue.totalFileSizeInBytes"
    ></app-totals>
</div>

<div
    #trackContextMenuAnchor
    style="visibility: hidden; position: fixed"
    [style.left]="contextMenuOpener.positionX"
    [style.top]="contextMenuOpener.positionY"
    [matMenuTriggerFor]="trackContextMenu"
></div>
<mat-menu #trackContextMenu="matMenu">
    <ng-template matMenuContent let-track="data">
        <button mat-menu-item (click)="onRemoveFromQueue()">{{ 'remove-from-playback-queue' | translate }}</button>
    </ng-template>
</mat-menu>
