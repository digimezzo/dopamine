name: Merge builds
env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
on:
    pull_request:
        types: [closed]

jobs:
    merge_build_on_linux:
        runs-on: ubuntu-22.04
        if: github.event.pull_request.merged == true
        steps:
            - uses: actions/checkout@v2
            - uses: actions/setup-node@master
              with:
                  node-version: '22.x'
            - name: update package directory
              run: sudo apt update
            - name: install rpm and libarchive
              run: sudo apt install rpm libarchive-tools
            - name: install dependencies
              run: npm install
            - name: run unit tests
              run: npm run test
            - name: build
              run: npm run electron:linux
            - name: fetch current version
              id: ver_name
              uses: notiz-dev/github-action-json-property@release
              with:
                  path: 'package.json'
                  prop_path: 'version'
            - name: uploading rpm artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dopamine-merge-rpm
                  path: release/dopamine-*.rpm
            - name: upload deb artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dopamine-merge-deb
                  path: release/dopamine-*.deb
            - name: upload appimage artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dopamine-merge-appimage
                  path: release/dopamine-*.AppImage
            - name: upload snap artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dopamine-merge-snap
                  path: release/dopamine-*.snap
            - name: upload pacman artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dopamine-merge-pacman
                  path: release/dopamine-*.pacman

    merge_build_on_mac_arm:
        runs-on: macos-15
        if: github.event.pull_request.merged == true
        steps:
            - uses: actions/checkout@v2
            - uses: actions/setup-node@master
              with:
                  node-version: '22.x'
            - name: install dependencies
              run: npm install
            - name: run unit tests
              run: npm run test
            - name: build
              run: npm run electron:mac
            - name: fetch current version
              id: ver_name
              uses: notiz-dev/github-action-json-property@release
              with:
                  path: 'package.json'
                  prop_path: 'version'
            - name: upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dopamine-merge-macos-arm
                  path: release/dopamine-*.dmg

    merge_build_on_mac_intel:
        runs-on: macos-15-intel
        if: github.event.pull_request.merged == true
        steps:
            - uses: actions/checkout@v2
            - uses: actions/setup-node@master
              with:
                  node-version: '22.x'
            - name: install dependencies
              run: npm install
            - name: run unit tests
              run: npm run test
            - name: build
              run: npm run electron:mac
            - name: fetch current version
              id: ver_name
              uses: notiz-dev/github-action-json-property@release
              with:
                  path: 'package.json'
                  prop_path: 'version'
            - name: upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dopamine-merge-macos-intel
                  path: release/dopamine-*.dmg

    merge_build_on_win:
        runs-on: windows-2022
        if: github.event.pull_request.merged == true
        steps:
            - uses: actions/checkout@v2
            - uses: actions/setup-node@master
              with:
                  node-version: '22.x'
            - name: Install dependencies
              run: npm install
            - name: Run unit tests
              run: npm run test
            - name: Build
              run: npm run electron:windows
            - name: Fetch current version
              id: ver_name
              uses: notiz-dev/github-action-json-property@release
              with:
                  path: 'package.json'
                  prop_path: 'version'
            - name: Download and Install 7-Zip
              run: |
                  curl -L -o 7z.exe https://www.7-zip.org/a/7z2600-x64.exe
                  Start-Process -FilePath 7z.exe -ArgumentList '/S' -Wait
            - name: Create 7z Archive With Only EXE Files
              shell: cmd
              run: |
                  cd release
                  "C:\Program Files\7-Zip\7z.exe" a ../dopamine-nightly-win.7z dopamine-*.exe
            - name: Upload Build Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dopamine-nightly-win
                  path: dopamine-nightly-win.7z
